<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cart | No Vanity 33</title><link rel="stylesheet" href="assets/css/style.css"></head><body><header class="site-header"><a href="index.html"><img class="logo" src="assets/images/novanity33-logo.png"></a><nav class="nav"><a href="index.html">Home</a><a href="index.html#catalog">Shop</a><a class="cart-pill" href="cart.html">🛒 Cart <span data-cart-count>0</span></a></nav></header><main class="catalog"><div class="section-head"><h2>Your Cart</h2><p>Connect each product to Printful/checkout when ready. The customer never sees a Printful button.</p></div><div id="cartList"></div><p style="text-align:center;margin-top:24px"><a class="btn" href="checkout.html">Checkout</a> <a class="btn alt" href="index.html#catalog">Keep Shopping</a></p></main><script src="assets/js/products.js"></script><script src="assets/js/app.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{const c=getCart();const el=document.getElementById('cartList');el.innerHTML=c.length?c.map((i,n)=>`<div class="product-card" style="margin:12px auto;max-width:850px"><div class="product-body"><div class="product-title">${i.name}</div><div>${i.color} / ${i.size} / Qty ${i.qty}</div><div class="price">$${(i.price*i.qty).toFixed(2)}</div></div></div>`).join(''):'<p style="text-align:center">Your cart is empty.</p>'})</script></body></html>
