<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cart | No Vanity 33</title><link rel="stylesheet" href="assets/css/style.css"></head><body><header class="topbar"><div class="wrap header"><a class="brand" href="index.html"><img src="assets/images/brand/crown33-logo.png"><div><div class="brand-title">NO VANITY <span>33</span></div><div class="tag">WEAR THE WORD. LIVE THE GOSPEL.</div></div></a><nav class="nav"><a href="index.html">Home</a><a href="index.html#catalog">Shop</a><a href="mission.html">Mission</a><a href="prayer-wall.html">Prayer Wall</a><a href="contact.html">Contact</a></nav><img class="right-logo" src="assets/images/brand/lion-crown-logo.png"><a class="cart" href="cart.html">🛒 Cart <span data-cart-count>0</span></a></div></header><main class="wrap page"><div class="page-card"><h1>Cart</h1><div id="cartItems" class="cart-list"></div><h2 id="total"></h2><a class="btn primary checkout" href="checkout.html">Continue to Checkout</a></div></main><script src="assets/js/app.js"></script><script>const c=JSON.parse(localStorage.getItem('nv33cart')||'[]');const box=document.getElementById('cartItems');let total=0;if(!c.length){box.innerHTML='<p class="empty">Your cart is empty.</p>'}else{box.innerHTML=c.map(i=>{total+=i.price*i.qty;return `<div class="cart-item"><div><b>${i.name}</b><br>${i.color} / ${i.size} × ${i.qty}</div><div>$${(i.price*i.qty).toFixed(2)}</div></div>`}).join('')}document.getElementById('total').textContent='Total: $'+total.toFixed(2);</script></body></html>
