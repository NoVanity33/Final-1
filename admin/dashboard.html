<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NV33 Owner Dashboard</title><link rel="stylesheet" href="../css/style.css"><style>body{background:#070707;color:#fff}.wrap{max-width:1100px;margin:auto;padding:30px 18px}.panel,.metric{background:#111;border:1px solid #4b3d1e;border-radius:12px;padding:18px}.login{max-width:520px;margin:80px auto}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0}.metric b{display:block;font-size:1.7rem;color:#f6c442}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}input,button{padding:12px;border-radius:7px}input{width:100%;box-sizing:border-box;background:#080808;color:#fff;border:1px solid #66552a}button{background:#f6c442;border:0;font-weight:800;cursor:pointer}.row{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #282012;padding:10px 0}.good{color:#8ee39b}.bad{color:#ff9b9b}.muted{color:#aaa}@media(max-width:800px){.metrics{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>NO VANITY 33 — OWNER DASHBOARD</h1><div id="login" class="panel login"><p>Enter your private admin token.</p><input id="token" type="password" placeholder="ADMIN_SYNC_TOKEN"><button id="go">Open Dashboard</button><p id="loginMsg"></p></div><div id="dash" hidden><div style="display:flex;gap:10px;flex-wrap:wrap"><button id="refresh">Refresh</button><button id="sync">Force Printful Sync</button><a class="btn" href="../index.html">View Store</a></div><p id="status"></p><div class="metrics"><div class="metric"><span>Paid sales</span><b id="paid">—</b></div><div class="metric"><span>Gross revenue</span><b id="gross">—</b></div><div class="metric"><span>Printful orders</span><b id="orders">—</b></div><div class="metric"><span>Synced variants</span><b id="variants">—</b></div></div><div class="grid2"><section class="panel"><h2>System Health</h2><div id="health"></div></section><section class="panel"><h2>Recent Stripe Sales</h2><div id="stripe"></div></section><section class="panel"><h2>Recent Printful Orders</h2><div id="printful"></div></section><section class="panel"><h2>Printful Catalog</h2><div id="catalog"></div></section></div></div></div><script>
const $=id=>document.getElementById(id);let token=sessionStorage.getItem('nv33_admin_token')||'';$('token').value=token;const headers=()=>({'x-admin-token':token});
$('go').onclick=()=>{token=$('token').value.trim();sessionStorage.setItem('nv33_admin_token',token);loadAll()};$('refresh').onclick=loadAll;$('sync').onclick=()=>loadCatalog(true);
async function api(url){const r=await fetch(url,{headers:headers()});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Request failed');return d}
async function loadAll(){try{$('loginMsg').textContent='Checking…';const [h,o,c]=await Promise.all([api('/api/system-health'),api('/api/admin-overview'),api('/api/printful-catalog')]);$('login').hidden=true;$('dash').hidden=false;renderHealth(h);renderOverview(o);renderCatalog(c);$('status').className='good';$('status').textContent='Dashboard updated.'}catch(e){$('loginMsg').className='bad';$('loginMsg').textContent=e.message}}
function renderHealth(d){$('variants').textContent=d.printful?.variants??'—';$('health').innerHTML=Object.entries(d.checks||{}).map(([k,v])=>`<div class="row"><span>${k}</span><strong class="${v?'good':'bad'}">${v?'Ready':'Missing'}</strong></div>`).join('')+`<div class="row"><span>Printful connection</span><strong class="${d.printful?.ok?'good':'bad'}">${d.printful?.ok?'Connected':'Error'}</strong></div><div class="row"><span>Detected store ID</span><strong>${d.printful?.storeId||'Automatic / not required'}</strong></div>${d.printful?.error?`<p class="bad">${d.printful.error}</p>`:''}`}
function renderOverview(d){$('paid').textContent=d.paidOrders;$('gross').textContent='$'+Number(d.gross||0).toFixed(2);$('orders').textContent=d.printfulOrders;$('stripe').innerHTML=d.recentStripe?.length?d.recentStripe.map(x=>`<div class="row"><span>${x.email||'Customer'}<br><small class="muted">${new Date(x.created*1000).toLocaleString()}</small></span><strong>$${Number(x.total).toFixed(2)}</strong></div>`).join(''):'<p>No paid Checkout Sessions found.</p>';$('printful').innerHTML=d.recentPrintful?.length?d.recentPrintful.map(x=>`<div class="row"><span>${x.recipient||'Customer'}<br><small class="muted">${x.status}</small></span><strong>${x.total||''}</strong></div>`).join(''):'<p>No Printful orders found.</p>'}
function renderCatalog(d){$('variants').textContent=d.variants;$('catalog').innerHTML=`<p><strong>${d.count}</strong> products and <strong>${d.variants}</strong> variants synced.</p>`+(d.products||[]).slice(0,15).map(p=>`<div class="row"><span>${p.name}</span><strong>${p.variants.length} sizes</strong></div>`).join('')}
async function loadCatalog(force){try{$('status').textContent='Syncing Printful…';renderCatalog(await api('/api/printful-catalog'+(force?'?refresh=1':'')));$('status').className='good';$('status').textContent='Printful catalog synced.'}catch(e){$('status').className='bad';$('status').textContent=e.message}}
if(token)loadAll();
</script></body></html>
