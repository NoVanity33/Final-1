<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Printful Sync | No Vanity 33</title><style>body{font-family:system-ui;background:#080808;color:#fff;max-width:1000px;margin:40px auto;padding:20px}input,button{padding:12px;margin:5px 0;background:#141414;color:#fff;border:1px solid #b78a22;border-radius:6px}input{width:min(520px,100%)}button{cursor:pointer;background:#e3ac28;color:#111;font-weight:700}pre{white-space:pre-wrap;background:#111;padding:16px;border:1px solid #333;border-radius:8px;max-height:65vh;overflow:auto}.note{color:#c8bea6}</style></head><body><h1>No Vanity 33 — Printful Sync</h1><p class="note">Enter the ADMIN_SYNC_TOKEN stored in Cloudflare. The token is sent only to your own API endpoint.</p><input id="token" type="password" placeholder="Admin sync token"><br><button id="sync">Sync Products</button> <button id="download" disabled>Download JSON</button><p id="status"></p><pre id="output">Ready.</pre><script>let latest=null;sync.onclick=async()=>{status.textContent='Syncing...';output.textContent='';try{const r=await fetch('/api/printful-catalog',{headers:{'x-admin-token':token.value}});const d=await r.json();if(!r.ok)throw new Error(d.error||'Sync failed');latest=d;output.textContent=JSON.stringify(d,null,2);status.textContent=`Synced ${d.count} products.`;download.disabled=false}catch(e){status.textContent=e.message;output.textContent=''}};download.onclick=()=>{const blob=new Blob([JSON.stringify(latest,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='printful-catalog.json';a.click();URL.revokeObjectURL(a.href)};</script></body></html>
