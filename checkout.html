<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout | No Vanity 33</title>
<link rel="stylesheet" href="css/style.css?v=33">
</head>
<body>
<header class="header">
  <a class="logo" href="index.html">
    <img src="assets/logos/lion33.png" alt="No Vanity 33">
    <span><strong>NO VANITY 33</strong><small>SECURE CHECKOUT</small></span>
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#shop">Shop</a>
  </nav>
</header>

<main class="section">
  <div class="center">
    <p class="eyebrow">Secure Checkout</p>
    <h1>REVIEW YOUR ORDER</h1>
    <p class="lead" style="margin:0 auto 28px;">Your order will be processed securely through Stripe.</p>
  </div>

  <div class="callout" style="align-items:flex-start;">
    <div style="width:100%;">
      <h3>Your Cart</h3>
      <div id="checkoutItems"></div>
      <p id="checkoutTotal" class="price"></p>
      <button id="checkoutBtn" class="add">Pay Securely with Stripe</button>
      <p id="checkoutMsg" style="color:#f6c442;margin-top:14px;"></p>
    </div>
  </div>
</main>

<script>
const money = v => '$' + Number(v || 0).toFixed(2);
const msg = document.getElementById('checkoutMsg');
const itemsBox = document.getElementById('checkoutItems');
const totalBox = document.getElementById('checkoutTotal');
const btn = document.getElementById('checkoutBtn');

let cart = JSON.parse(localStorage.getItem('nv33cart') || '[]');
let products = [];

function renderCheckout(){
  if(!cart.length){
    itemsBox.innerHTML = '<p>Your cart is empty.</p><p><a class="btn primary" href="index.html#shop">Return to Shop</a></p>';
    totalBox.textContent = '';
    btn.style.display = 'none';
    return;
  }

  const total = cart.reduce((s,i)=>s + Number(i.price || 0), 0);
  itemsBox.innerHTML = cart.map(i => `
    <div class="cartrow">
      <span>${i.name}<br><small>${[i.color, i.size].filter(Boolean).join(' · ')}</small></span>
      <b>${money(i.price)}</b>
    </div>
  `).join('');
  totalBox.textContent = 'Total: ' + money(total);
}

async function loadProducts(){
  try{
    const res = await fetch('data/products.json?v=stripe-v1');
    products = await res.json();
  }catch(e){
    console.error(e);
    msg.textContent = 'Could not load product data. Please contact novanity2026@gmail.com.';
  }
}

function findProduct(cartItem){
  return products.find(p => 
    (cartItem.id && p.id === cartItem.id) ||
    (cartItem.name && p.name === cartItem.name)
  );
}

async function startCheckout(){
  if(!cart.length) return;

  if(!products.length){
    await loadProducts();
  }

  const lineItems = [];
  const missing = [];

  for(const item of cart){
    const p = findProduct(item);
    const stripePriceId = item.stripePriceId || item.priceId || p?.stripePriceId || p?.priceId || '';

    if(!stripePriceId){
      missing.push(item.name);
      continue;
    }

    lineItems.push({
      price: stripePriceId,
      quantity: 1,
      productId: item.id || p?.id || '',
      size: item.size || '',
      color: item.color || ''
    });
  }

  if(missing.length){
    msg.textContent = 'These items are not connected to Stripe yet: ' + missing.join(', ');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Opening secure checkout...';
  msg.textContent = '';

  try{
    const res = await fetch('/api/create-checkout-session', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({items:lineItems})
    });

    const data = await res.json().catch(()=>({}));

    if(data.url){
      window.location.href = data.url;
    }else{
      msg.textContent = data.error || 'Checkout could not start. Please contact novanity2026@gmail.com.';
      btn.disabled = false;
      btn.textContent = 'Pay Securely with Stripe';
    }
  }catch(err){
    console.error(err);
    msg.textContent = 'Checkout could not start. Please contact novanity2026@gmail.com.';
    btn.disabled = false;
    btn.textContent = 'Pay Securely with Stripe';
  }
}

btn.addEventListener('click', startCheckout);
loadProducts();
renderCheckout();
</script>
</body>
</html>
